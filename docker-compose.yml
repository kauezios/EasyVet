version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: easyvet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: easyvet
      POSTGRES_USER: easyvet
      POSTGRES_PASSWORD: easyvet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

